<!DOCTYPE html>
<html>
<head>
    <title>测试页面</title>
</head>
<body>
    <h1>测试指标加载</h1>
    <button onclick="testLoadIndicators()">测试加载指标</button>
    <div id="result"></div>
    
    <script>
        async function testLoadIndicators() {
            console.log('开始测试加载指标...');
            try {
                const response = await fetch('/api/indicators');
                console.log('API响应:', response);
                const result = await response.json();
                console.log('解析结果:', result);
                
                document.getElementById('result').innerHTML = `
                    <h2>API测试结果:</h2>
                    <p>状态: ${response.status}</p>
                    <p>成功: ${result.success}</p>
                    <p>数据长度: ${result.data ? result.data.length : 0}</p>
                    <pre>${JSON.stringify(result, null, 2)}</pre>
                `;
            } catch (error) {
                console.error('错误:', error);
                document.getElementById('result').innerHTML = `<p style="color: red;">错误: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
