<!-- 步骤1: 指标选择组件 -->
<style>
.category-section {
    border: 1px solid #e9ecef;
    border-radius: 8px;
    padding: 15px;
    background-color: #f8f9fa;
}
.category-title {
    color: #495057;
    margin-bottom: 15px;
    padding-bottom: 8px;
    border-bottom: 2px solid #dee2e6;
}
.category-indicators {
    background-color: white;
    border-radius: 5px;
    padding: 10px;
}
.form-check {
    padding: 8px;
    border-radius: 4px;
    transition: background-color 0.2s;
}
.form-check:hover {
    background-color: #f1f3f4;
}
</style>
<div id="step1" class="tab-pane active">
    <div class="card">
        <div class="card-header">
            <h3>选择评价指标</h3>
        </div>
        <div class="card-body">
            <div id="indicators-loading" class="loading">正在加载指标数据...</div>
            <div id="indicators-content" style="display: none;">
                <p class="mb-3">请选择需要参与评价的指标：</p>
                <div id="indicators-list" class="indicator-list"></div>
                <div class="mt-3">
                    <button class="btn btn-primary" onclick="selectIndicators()">确认选择</button>
                    <button class="btn btn-warning" onclick="selectAllIndicators()">全选</button>
                    <button class="btn btn-danger" onclick="clearSelection()">清空</button>
                </div>
            </div>
            <div id="step1-result"></div>
        </div>
    </div>
</div>

<script>
// 指标选择相关的JavaScript函数

// 加载指标数据
async function loadIndicators() {
    try {
        const response = await fetch('/api/indicators');
        const result = await response.json();
        
        if (result.success) {
            allIndicators = result.data;
            displayIndicatorsByCategory(result.categories);
            document.getElementById('indicators-loading').style.display = 'none';
            document.getElementById('indicators-content').style.display = 'block';
        } else {
            document.getElementById('indicators-loading').innerHTML = `<div class="alert alert-danger">加载失败: ${result.message}</div>`;
        }
    } catch (error) {
        document.getElementById('indicators-loading').innerHTML = `<div class="alert alert-danger">网络错误: ${error.message}</div>`;
    }
}

// 按分类显示指标列表
function displayIndicatorsByCategory(categories) {
    const listDiv = document.getElementById('indicators-list');
    let html = '';
    
    categories.forEach(category => {
        html += `
            <div class="category-section mb-4">
                <h5 class="category-title">
                    <i class="fas fa-folder-open"></i> ${category.name}
                    <span class="badge badge-secondary ml-2">${category.indicators.length}个指标</span>
                </h5>
                <div class="category-indicators pl-3">
        `;
        
        category.indicators.forEach(indicator => {
            html += `
                <div class="form-check mb-2">
                    <input class="form-check-input" type="checkbox" 
                           id="indicator-${indicator.id}" 
                           value="${indicator.id}" 
                           onchange="updateSelectedCount()">
                    <label class="form-check-label" for="indicator-${indicator.id}">
                        <strong>${indicator.name}</strong>
                        <span class="text-muted">(${indicator.unit})</span>
                    </label>
                </div>
            `;
        });
        
        html += `
                </div>
            </div>
        `;
    });
    
    listDiv.innerHTML = html;
}

// 显示指标列表（保留兼容性）
function displayIndicators(indicators) {
    const listDiv = document.getElementById('indicators-list');
    let html = '';
    
    indicators.forEach(indicator => {
        html += `
            <div class="form-check">
                <input class="form-check-input" type="checkbox" 
                       id="indicator-${indicator.id}" 
                       value="${indicator.id}" 
                       onchange="updateSelectedCount()">
                <label class="form-check-label" for="indicator-${indicator.id}">
                    <strong>${indicator.name}</strong>
                    <span class="text-muted">(${indicator.unit})</span>
                </label>
            </div>
        `;
    });
    
    listDiv.innerHTML = html;
}

// 选择指标
async function selectIndicators() {
    const checkboxes = document.querySelectorAll('.form-check-input:checked');
    const selectedIds = Array.from(checkboxes).map(cb => cb.value);
    
    if (selectedIds.length === 0) {
        showAlert('请至少选择一个指标', 'warning');
        return;
    }
    
    try {
        const response = await fetch('/api/indicators/select', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                indicator_ids: selectedIds
            })
        });
        
        const result = await response.json();
        
        if (result.success) {
            selectedIndicators = allIndicators.filter(ind => selectedIds.includes(ind.id));
            showAlert(result.message, 'success');
            
            // 延迟1秒后自动跳转到下一步
            setTimeout(() => {
                showTab('step2');
            }, 1000);
        } else {
            showAlert(result.message, 'danger');
        }
    } catch (error) {
        showAlert('网络错误: ' + error.message, 'danger');
    }
}

// 全选指标
function selectAllIndicators() {
    const checkboxes = document.querySelectorAll('.form-check-input');
    checkboxes.forEach(cb => cb.checked = true);
    showAlert(`已选择所有 ${allIndicators.length} 个指标`, 'info');
}

// 清空选择
function clearSelection() {
    const checkboxes = document.querySelectorAll('.form-check-input');
    checkboxes.forEach(cb => cb.checked = false);
    updateSelectedCount();
    showAlert('已清空所有选择', 'info');
}

// 更新选中指标数量显示
function updateSelectedCount() {
    const checkboxes = document.querySelectorAll('.form-check-input:checked');
    const count = checkboxes.length;
    
    // 可以在这里添加显示选中数量的逻辑
    // 例如更新某个元素的文本内容
    console.log(`已选择 ${count} 个指标`);
}
</script>
