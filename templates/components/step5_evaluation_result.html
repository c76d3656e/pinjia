<!-- 步骤5: 综合评价结果组件 -->
<div id="step5" class="tab-pane">
    <div class="card">
        <div class="card-header">
            <h3>综合评价结果</h3>
        </div>
        <div class="card-body">
            <div id="evaluation-loading" class="text-center" style="display: none;">
                <div class="spinner-border" role="status">
                    <span class="sr-only">计算中...</span>
                </div>
                <p class="mt-2">正在计算综合评价结果...</p>
            </div>
            <div id="evaluation-status" class="mb-3"></div>
            <div id="evaluation-result"></div>
            <div class="mt-3">
                <button class="btn btn-primary" onclick="calculateEvaluation()">重新计算</button>
                <button class="btn btn-success" onclick="exportResult()">导出结果</button>
            </div>
        </div>
    </div>
</div>

<script>
// 综合评价结果相关的JavaScript函数

// 计算综合评价
async function calculateEvaluation() {
    console.log('开始计算综合评价');
    console.log('selectedIndicators:', selectedIndicators);
    console.log('currentWeights:', currentWeights);
    console.log('currentRanges:', currentRanges);
    console.log('currentData:', currentData);
    
    if (selectedIndicators.length === 0) {
        showAlert('请先选择指标', 'warning');
        return;
    }
    
    if (Object.keys(currentWeights).length === 0) {
        showAlert('请先设置权重', 'warning');
        return;
    }
    
    if (Object.keys(currentRanges).length === 0) {
        showAlert('请先设置范围。当前范围数据: ' + JSON.stringify(currentRanges), 'warning');
        return;
    }
    
    if (Object.keys(currentData).length === 0) {
        showAlert('请先输入实测值', 'warning');
        return;
    }
    
    const loadingDiv = document.getElementById('evaluation-loading');
    const resultDiv = document.getElementById('evaluation-result');
    
    loadingDiv.style.display = 'block';
    resultDiv.innerHTML = '';
    
    try {
        const response = await fetch('/api/evaluation/calculate', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                indicators: selectedIndicators.map(ind => ind.id),
                weights: currentWeights,
                ranges: currentRanges,
                data: currentData
            })
        });
        
        const result = await response.json();
        
        loadingDiv.style.display = 'none';
        
        if (result.success) {
            displayEvaluationResult(result.data);
        } else {
            showAlert(result.message, 'danger');
        }
    } catch (error) {
        loadingDiv.style.display = 'none';
        showAlert('网络错误: ' + error.message, 'danger');
    }
}

// 显示评价结果
function displayEvaluationResult(data) {
    console.log('显示评价结果，接收到的数据:', data);
    const resultDiv = document.getElementById('evaluation-result');
    
    // 安全检查数据结构
    const overallScore = data.overall_score || 0;
    const indicatorResults = data.indicator_results || [];
    
    let html = `
        <div class="alert alert-success" style="display: none;">
            <h4 class="alert-heading">评价完成！</h4>
            <p class="mb-0">综合评价得分：<strong>${overallScore.toFixed(4)}</strong></p>
            <p class="mb-0">评价等级：<strong>${data.overall_grade || getEvaluationGrade(overallScore)}</strong></p>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h5><i class="fas fa-table me-2"></i>指标评价详情</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th class="text-center py-3">指标名称</th>
                                <th class="text-center py-3">实测值</th>
                                <th class="text-center py-3">得分</th>
                                <th class="text-center py-3">等级</th>
                                <th class="text-center py-3">权重</th>
                                <th class="text-center py-3">加权得分</th>
                            </tr>
                        </thead>
                        <tbody>
    `;
    
    indicatorResults.forEach(result => {
        const score = result.score || 0;
        const weight = result.weight || 0;
        const weightedScore = score * weight;
        
        // 根据分数直接设置颜色和样式（色盲友好配色方案）
        let rowStyle = '';
        let gradeBadge = '';
        let scoreColor = '';
        let gradeText = result.grade || getEvaluationGrade(score);
        
        if (score >= 90) {
            // 深绿色 - 优秀等级 (90-100分)
            rowStyle = 'background: linear-gradient(135deg, #e8f5e8 0%, #d4f1d4 100%); border-left: 5px solid #2d7d32;';
            gradeBadge = '<span class="badge fs-6 px-3 py-2" style="background-color: #2d7d32; color: white;">优秀</span>';
            scoreColor = 'color: #1b5e20; font-weight: bold;';
        } else if (score >= 80) {
            // 浅绿色 - 良好等级 (80-90分)
            rowStyle = 'background: linear-gradient(135deg, #f1f8e9 0%, #e8f5e8 100%); border-left: 5px solid #689f38;';
            gradeBadge = '<span class="badge fs-6 px-3 py-2" style="background-color: #689f38; color: white;">良好</span>';
            scoreColor = 'color: #33691e; font-weight: bold;';
        } else if (score >= 70) {
            // 橙黄色 - 一般等级 (70-80分)
            rowStyle = 'background: linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%); border-left: 5px solid #ff8f00;';
            gradeBadge = '<span class="badge fs-6 px-3 py-2" style="background-color: #ff8f00; color: white;">一般</span>';
            scoreColor = 'color: #e65100; font-weight: bold;';
        } else if (score >= 60) {
            // 橙红色 - 较差等级 (60-70分)
            rowStyle = 'background: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 100%); border-left: 5px solid #e53935;';
            gradeBadge = '<span class="badge fs-6 px-3 py-2" style="background-color: #e53935; color: white;">较差</span>';
            scoreColor = 'color: #c62828; font-weight: bold;';
        } else {
            // 深红色 - 很差等级 (0-60分)
            rowStyle = 'background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%); border-left: 5px solid #b71c1c;';
            gradeBadge = '<span class="badge fs-6 px-3 py-2" style="background-color: #b71c1c; color: white;">很差</span>';
            scoreColor = 'color: #b71c1c; font-weight: bold;';
        }
        
        html += `
            <tr style="${rowStyle}">
                <td class="fw-bold py-3 px-4">${result.indicator_name || '未知指标'}</td>
                <td class="text-center py-3" style="font-weight: 500;">${result.measured_value || 'N/A'}</td>
                <td class="text-center py-3" style="${scoreColor}">${score.toFixed(4)}</td>
                <td class="text-center py-3">${gradeBadge}</td>
                <td class="text-center py-3" style="font-weight: 500;">${(weight * 100).toFixed(2)}%</td>
                <td class="text-center py-3" style="color: #0d6efd; font-weight: bold; font-size: 1.1em;">${weightedScore.toFixed(4)}</td>
            </tr>
        `;
    });
    
    html += `
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <div class="card mt-3 border-primary">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="fas fa-chart-line me-2"></i>评价总结</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <div class="d-flex align-items-center mb-3">
                            <i class="fas fa-cogs text-primary me-2"></i>
                            <span><strong>评价方法：</strong>多指标综合评价法</span>
                        </div>
                        <div class="d-flex align-items-center mb-3">
                            <i class="fas fa-list-ol text-info me-2"></i>
                            <span><strong>指标数量：</strong>${indicatorResults.length}个</span>
                        </div>
                        <div class="d-flex align-items-center mb-3">
                            <i class="fas fa-clock text-secondary me-2"></i>
                            <span><strong>计算时间：</strong>${new Date().toLocaleString()}</span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="text-center">
                            <div class="display-4 fw-bold text-primary mb-2">${overallScore.toFixed(4)}</div>
                            <div class="h5 mb-3">综合得分</div>
                            <div class="h4">
                                ${getGradeBadgeHtml(data.overall_grade || getEvaluationGrade(overallScore))}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    `;
    
    resultDiv.innerHTML = html;
}

// 根据得分获取评价等级
function getEvaluationGrade(score) {
    if (score >= 90) return '优秀';
    if (score >= 80) return '良好';
    if (score >= 70) return '一般';
    if (score >= 60) return '较差';
    return '很差';
}

// 根据等级获取徽章HTML（色盲友好配色方案）
function getGradeBadgeHtml(grade) {
    switch(grade) {
        case '优秀':
            return '<span class="badge fs-6 px-3 py-2" style="background-color: #2d7d32; color: white;">优秀</span>';
        case '良好':
            return '<span class="badge fs-6 px-3 py-2" style="background-color: #689f38; color: white;">良好</span>';
        case '中等':
        case '一般':
            return '<span class="badge fs-6 px-3 py-2" style="background-color: #ff8f00; color: white;">一般</span>';
        case '及格':
        case '较差':
            return '<span class="badge fs-6 px-3 py-2" style="background-color: #e53935; color: white;">较差</span>';
        case '不及格':
        case '很差':
            return '<span class="badge fs-6 px-3 py-2" style="background-color: #b71c1c; color: white;">很差</span>';
        default:
            return `<span class="badge fs-6 px-3 py-2" style="background-color: #757575; color: white;">${grade}</span>`;
    }
}

// 导出结果
function exportResult() {
    if (!document.getElementById('evaluation-result').innerHTML) {
        showAlert('请先计算评价结果', 'warning');
        return;
    }
    
    // 这里可以实现导出功能，比如生成PDF或Excel
    showAlert('导出功能开发中...', 'info');
}

// 当步骤5被激活时，检查数据状态
function onStep5Activated() {
    checkDataStatus();
}

// 检查数据状态
function checkDataStatus() {
    const statusDiv = document.getElementById('evaluation-status');
    let statusHtml = '<div class="alert alert-info" style="display: none;"><h5>数据状态检查</h5>';
    
    // 检查指标选择
    if (selectedIndicators.length > 0) {
        statusHtml += `<p class="text-success mb-1">✓ 已选择 ${selectedIndicators.length} 个指标</p>`;
    } else {
        statusHtml += '<p class="text-danger mb-1">✗ 未选择指标</p>';
    }
    
    // 检查权重设置
    if (Object.keys(currentWeights).length > 0) {
        statusHtml += `<p class="text-success mb-1">✓ 已设置 ${Object.keys(currentWeights).length} 个指标权重</p>`;
    } else {
        statusHtml += '<p class="text-danger mb-1">✗ 未设置权重</p>';
    }
    
    // 检查范围设置
    if (Object.keys(currentRanges).length > 0) {
        statusHtml += `<p class="text-success mb-1">✓ 已设置 ${Object.keys(currentRanges).length} 个指标范围</p>`;
    } else {
        statusHtml += '<p class="text-danger mb-1">✗ 未设置范围</p>';
    }
    
    // 检查实测数据
    if (Object.keys(currentData).length > 0) {
        statusHtml += `<p class="text-success mb-1">✓ 已输入 ${Object.keys(currentData).length} 个指标实测值</p>`;
    } else {
        statusHtml += '<p class="text-danger mb-1">✗ 未输入实测值</p>';
    }
    
    statusHtml += '</div>';
    statusDiv.innerHTML = statusHtml;
    
    // 如果所有数据都准备好了，自动计算
    if (selectedIndicators.length > 0 && 
        Object.keys(currentWeights).length > 0 && 
        Object.keys(currentRanges).length > 0 && 
        Object.keys(currentData).length > 0) {
        calculateEvaluation();
    }
}
</script>
